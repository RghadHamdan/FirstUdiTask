<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/contact.css" />
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h2>KOCHI</h2>
                </div>
                <ul class="nav-links">
                    <li>
                        <a href="../index.html ">Home</a>
                    </li>
                    <li>
                        <a href="../page/contact.html" class="bold">Contact</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <section class="hero-sec ">
        <img src="../images/rainbow-vortex.png" alt=" rainbow background" class="hero-sec-bg">
        <div class="container">
            <div class="hero-sec-content">
                <h1>CONTACT US</h1>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container contact-layout">
            <section class="contact-details">
                <h2>Contact Details</h2>
                <address class="address">
                <p>contact@kochi.com</p>
                <p>(555) 555-5555</p>
                <p class="address-title"><strong>Central HQ</strong></p>
                <p>123 Avenue Street</p>
                <p>City Township, CA 12345</p>
                </address>
            </section>


            <section class="contact-form">
                <h2>Online Inquiry</h2>
                <form class="form" action="#" method="post">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input id="name" name="name" type="text" placeholder="e.g. John Smith" required />
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="e.g. name@domain.tld" required />
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message"
                            placeholder="Type your message here (between 20 and 500 characters)" maxlength="500" minlength="20" required></textarea>
                    </div>

                    <div class="form-actions">
                        <button class="btn-success" type="submit">SUBMIT</button>
                        <button class="btn-danger" type="reset">RESET</button>
                    </div>
                </form>
            </section>
        </div>
    </section>


    <footer class="footer">
        <div class="container">
            <p class="footer-content">Copyright Kochi Inc. 2024. Developed by Eric Kovalevskyy.</p>
        </div>
    </footer>
</body>

</html>
